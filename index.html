<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>دعوة زفاف محمد & هاجر</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #1a1a1a, #3a0ca3);
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    .container {
      padding: 40px 20px;
      animation: fadeIn 2s ease;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      animation: slideDown 1.5s ease;
    }

    h2 {
      font-size: 2rem;
      color: #ffd166;
    }

    .date {
      font-size: 1.5rem;
      margin: 20px 0;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 30px 0;
      flex-wrap: wrap;
    }

    .box {
      background: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 10px;
      min-width: 80px;
    }

    .box span {
      display: block;
      font-size: 2rem;
      font-weight: bold;
    }

    button {
      background: #ff4d6d;
      border: none;
      padding: 15px 25px;
      font-size: 1.2rem;
      color: white;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff758f;
      transform: scale(1.1);
    }

    .heart {
      position: fixed;
      color: #ff4d6d;
      animation: float 5s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh); opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    @keyframes slideDown {
      from {transform: translateY(-50px); opacity: 0;}
      to {transform: translateY(0); opacity: 1;}
    }
  </style>
</head>

<body>

<div class="container">
  <h1>💍 محمد & هاجر 💍</h1>
  <h2>بدعوكوا تشاركونا أجمل يوم في حياتنا</h2>

  <div class="date">📅 23 أبريل 2026</div>

  <div class="countdown">
    <div class="box"><span id="days">0</span>يوم</div>
    <div class="box"><span id="hours">0</span>ساعة</div>
    <div class="box"><span id="minutes">0</span>دقيقة</div>
    <div class="box"><span id="seconds">0</span>ثانية</div>
  </div>

  <button onclick="openMap()">📍 مكان الفرح</button>
</div>

<script>
  const weddingDate = new Date("April 23, 2026 20:00:00").getTime();

  setInterval(() => {
    const now = new Date().getTime();
    const diff = weddingDate - now;

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById("days").innerText = days;
    document.getElementById("hours").innerText = hours;
    document.getElementById("minutes").innerText = minutes;
    document.getElementById("seconds").innerText = seconds;
  }, 1000);

  function openMap() {
    window.open("https://share.google/UxTUPR2U4V8XlbIhM", "_blank");
  }

  function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerText = "❤";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 10 + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 5000);
  }

  setInterval(createHeart, 300);
</script>

</body>
</html>
