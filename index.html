<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mohamed & Hager Wedding</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a1a, #3a0ca3);
      color: white;
      text-align: center;
    }

    .container {
      padding: 40px 20px;
    }

    h1 {
      font-size: 3rem;
    }

    h2 {
      color: #ffd166;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 30px 0;
      flex-wrap: wrap;
    }

    .box {
      background: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 10px;
      min-width: 80px;
    }

    .box span {
      display: block;
      font-size: 2rem;
      font-weight: bold;
    }

    button {
      background: #ff4d6d;
      border: none;
      padding: 12px 20px;
      font-size: 1rem;
      color: white;
      border-radius: 25px;
      cursor: pointer;
      margin-top: 10px;
    }

    input, textarea {
      width: 80%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
    }

    .messages {
      margin-top: 30px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
    }

    .message {
      background: rgba(255,255,255,0.1);
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>💍 Mohamed & Hager 💍</h1>
  <h2>You are invited to our wedding</h2>
  <p>April 23, 2026</p>

  <div class="countdown">
    <div class="box"><span id="days">0</span>Days</div>
    <div class="box"><span id="hours">0</span>Hours</div>
    <div class="box"><span id="minutes">0</span>Minutes</div>
    <div class="box"><span id="seconds">0</span>Seconds</div>
  </div>

  <button onclick="openMap()">📍 Location</button>

  <h2>💌 Leave a message</h2>

  <input type="text" id="name" placeholder="Your name">
  <textarea id="message" placeholder="Write something nice..."></textarea>
  <br>
  <button onclick="sendMessage()">Send</button>

  <div class="messages" id="messages"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<script>
  // 🔥 IMPORTANT: Replace with your Firebase config
  const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
    projectId: "YOUR_PROJECT",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  function sendMessage() {
    const name = document.getElementById("name").value;
    const message = document.getElementById("message").value;

    if (name === "" || message === "") return;

    db.ref("messages").push({
      name: name,
      message: message
    });

    document.getElementById("name").value = "";
    document.getElementById("message").value = "";
  }

  db.ref("messages").on("child_added", snapshot => {
    const data = snapshot.val();

    const div = document.createElement("div");
    div.classList.add("message");
    div.innerHTML = "<strong>" + data.name + ":</strong><br>" + data.message;

    document.getElementById("messages").prepend(div);
  });

  function openMap() {
    window.open("https://share.google/UxTUPR2U4V8XlbIhM", "_blank");
  }

  const weddingDate = new Date("April 23, 2026 20:00:00").getTime();

  setInterval(() => {
    const now = new Date().getTime();
    const diff = weddingDate - now;

    document.getElementById("days").innerText = Math.floor(diff / (1000*60*60*24));
    document.getElementById("hours").innerText = Math.floor((diff / (1000*60*60)) % 24);
    document.getElementById("minutes").innerText = Math.floor((diff / (1000*60)) % 60);
    document.getElementById("seconds").innerText = Math.floor((diff / 1000) % 60);
  }, 1000);
</script>

</body>
</html>
